{% extends 'base.html' %}
{% set page_title = title %}
{% block content %}
<div class="content-card mt-3 form-card">
    <h5>{{ title }}</h5>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" value="{{ user.name if user else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password {% if user %}<small>(blank = no change)</small>{% endif %}</label>
                <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
            </div>
            <div class="col-md-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" required>
                    {% for r in ['Admin','Doctor','Patient','Staff'] %}
                    <option value="{{ r }}" {% if user and user.role == r %}selected{% endif %}>{{ r }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select" required>
                    {% for s in ['Active','Inactive'] %}
                    <option value="{{ s }}" {% if user and user.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-primary">Save User</button>
            <a href="{{ url_for('users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
