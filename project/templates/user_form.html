{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<!-- Page Header -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;" class="reveal">
  <div>
    <h2 style="font-family:var(--font-head);font-weight:800;color:var(--text-heading);margin-bottom:4px;">{{ title }}</h2>
    <p style="color:var(--text-sub);font-size:13.5px;margin-bottom:0;">Please complete the form credentials below.</p>
  </div>
  <a href="{{ url_for('admin_users') }}" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Users</a>
</div>

<!-- Form Card -->
<div class="content-card form-card reveal" style="padding:28px;margin:0 auto 40px;">
  <form method="POST" autocomplete="off" id="userForm">
    
    <!-- Row 1: Name + Email -->
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-icon-wrap">
          <span class="input-prefix">👤</span>
          <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Rahul Patil" value="{{ edit_user.name if edit_user else '' }}" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-prefix">📧</span>
          <input type="email" id="email" name="email" class="form-control" placeholder="e.g. rahul@example.com" value="{{ edit_user.email if edit_user else '' }}" required />
        </div>
      </div>
    </div>

    <!-- Row 2: Password + Role -->
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group">
        <label class="form-label" for="password">Password {% if edit_user %}<span style="font-size:11px;color:var(--text-muted);font-weight:normal;">(leave empty to keep current)</span>{% endif %}</label>
        <div class="input-icon-wrap" style="position:relative;">
          <span class="input-prefix">🔒</span>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" {% if not edit_user %}required{% endif %} style="padding-right:40px;" />
          <button type="button" class="pw-toggle" id="pw-toggle" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;z-index:2;">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="role">System Role</label>
        <select id="role" name="role" class="form-control" required>
          <option value="" disabled selected>Select user role</option>
          {% for r in ['Admin', 'Doctor', 'Patient'] %}
          <option value="{{ r }}" {% if edit_user and edit_user.role == r %}selected{% endif %}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Row 3: Status -->
    <div class="form-group" style="margin-bottom:24px;">
      <label class="form-label" for="status">Account Status</label>
      <select id="status" name="status" class="form-control" required>
        {% for s in ['Active', 'Inactive'] %}
        <option value="{{ s }}" {% if edit_user and edit_user.status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Form Actions -->
    <div style="display:flex;gap:12px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:20px;">
      <a href="{{ url_for('admin_users') }}" class="btn btn-ghost" style="border:1.5px solid var(--border);">Cancel</a>
      <button type="submit" class="btn btn-primary" id="saveBtn">Save Credentials</button>
    </div>

  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Password Visibility Toggle
  const toggleBtn = document.getElementById('pw-toggle');
  const pwInput = document.getElementById('password');
  if (toggleBtn && pwInput) {
    toggleBtn.addEventListener('click', () => {
      const isPass = pwInput.type === 'password';
      pwInput.type = isPass ? 'text' : 'password';
      toggleBtn.textContent = isPass ? '🙈' : '👁️';
    });
  }

  // Submit button loading state
  const form = document.getElementById('userForm');
  form.addEventListener('submit', () => {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = 'Saving…';
    saveBtn.disabled = true;
  });
});
</script>
{% endblock %}
