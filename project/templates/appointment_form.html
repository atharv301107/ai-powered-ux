{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<!-- Page Header -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;" class="reveal">
  <div>
    <h2 style="font-family:var(--font-head);font-weight:800;color:var(--text-heading);margin-bottom:4px;">{{ title }}</h2>
    <p style="color:var(--text-sub);font-size:13.5px;margin-bottom:0;">Please complete the schedule parameters below.</p>
  </div>
  <a href="{{ url_for('admin_appointments') }}" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Appointments</a>
</div>

<!-- Form Card -->
<div class="content-card form-card reveal" style="padding:28px;margin:0 auto 40px;">
  <form method="POST" autocomplete="off" id="apptForm">
    
    <!-- Row 1: Patient Name + Doctor Name -->
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group">
        <label class="form-label" for="patient_name">Patient Full Name</label>
        <div class="input-icon-wrap">
          <span class="input-prefix">👤</span>
          <input type="text" id="patient_name" name="patient_name" class="form-control" placeholder="e.g. Rahul Patil" value="{{ appointment.patient_name if appointment else '' }}" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="doctor_name">Practitioner / Doctor</label>
        <select id="doctor_name" name="doctor_name" class="form-control" required>
          <option value="" disabled selected>Select doctor</option>
          {% for doc in ['Dr. Sneha Patil', 'Dr. Mehta', 'Dr. Khan', 'Dr. Patil'] %}
          <option value="{{ doc }}" {% if appointment and appointment.doctor_name == doc %}selected{% endif %}>{{ doc }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Row 2: Date + Time -->
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group">
        <label class="form-label" for="appointment_date">Consultation Date</label>
        <input type="date" id="appointment_date" name="appointment_date" class="form-control" value="{{ appointment.appointment_date if appointment else '' }}" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="time">Time Slot</label>
        <div class="input-icon-wrap">
          <span class="input-prefix">🕒</span>
          <input type="text" id="time" name="time" class="form-control" placeholder="e.g. 10:30 AM" value="{{ appointment.time if appointment else '' }}" required />
        </div>
      </div>
    </div>

    <!-- Row 3: Department + Status -->
    <div class="form-row" style="margin-bottom:24px;">
      <div class="form-group">
        <label class="form-label" for="department">Specialty Department</label>
        <select id="department" name="department" class="form-control" required>
          <option value="" disabled selected>Select department</option>
          {% for dept in ['Cardiology', 'Dental', 'Orthopedic', 'General', 'Dermatology', 'Neurology', 'Pediatrics', 'Radiology'] %}
          <option value="{{ dept }}" {% if appointment and appointment.department == dept %}selected{% endif %}>{{ dept }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="status">Booking Status</label>
        <select id="status" name="status" class="form-control" required>
          {% for st in ['Pending', 'Confirmed', 'Upcoming', 'Completed', 'Cancelled'] %}
          <option value="{{ st }}" {% if appointment and appointment.status == st %}selected{% endif %}>{{ st }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Form Actions -->
    <div style="display:flex;gap:12px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:20px;">
      <a href="{{ url_for('admin_appointments') }}" class="btn btn-ghost" style="border:1.5px solid var(--border);">Cancel</a>
      <button type="submit" class="btn btn-primary" id="saveBtn">Save Appointment</button>
    </div>

  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('apptForm');
  form.addEventListener('submit', () => {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = 'Saving Booking…';
    saveBtn.disabled = true;
  });
});
</script>
{% endblock %}
