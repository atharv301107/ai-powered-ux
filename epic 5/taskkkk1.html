<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Healthcare Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e40af);
}

.container{
    width:450px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f8fafc;
}

.message{
    max-width:85%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.6;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:#e2e8f0;
    color:black;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        🏥 AI Healthcare Assistant
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Hello! Ask me any healthcare question.<br><br>
            Examples:<br>
            • What is fever?<br>
            • Symptoms of dengue<br>
            • What causes headache?<br>
            • Diabetes treatment
        </div>

    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask healthcare question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

// ==========================
// PASTE YOUR GEMINI API KEY
// ==========================

const API_KEY = "";

// ==========================

function addMessage(text,type){

    text = text
        .replace(/\n/g,"<br>")
        .replace(/\* /g,"• ");

    const msg=document.createElement("div");
    msg.className="message "+type;
    msg.innerHTML=text;

    const chatBox=document.getElementById("chatBox");
    chatBox.appendChild(msg);

    chatBox.scrollTop=chatBox.scrollHeight;
}

async function getAIResponse(question){

    try{

        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    contents:[
                        {
                            parts:[
                                {
                                    text:`
You are an AI Healthcare Assistant.

Rules:
- Answer only healthcare questions.
- Give answers in bullet points.
- Keep answers simple.
- Use 4 to 6 points.
- Add relevant emojis.
- End with:
"⚠️ Consult a healthcare professional for medical advice."

Question:
${question}
`
                                }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if(!response.ok){
            return "❌ API Error: " + (data.error?.message || "Unknown Error");
        }

        return data.candidates?.[0]?.content?.parts?.[0]?.text ||
               "No response received.";

    }catch(error){

        return "❌ Error: " + error.message;
    }
}

async function sendMessage(){

    const input = document.getElementById("userInput");

    const question = input.value.trim();

    if(question==="") return;

    addMessage(question,"user");

    input.value="";

    addMessage("⏳ Thinking...","bot");

    const chatBox = document.getElementById("chatBox");
    const thinking = chatBox.lastElementChild;

    const answer = await getAIResponse(question);

    thinking.remove();

    addMessage(answer,"bot");
}

document.getElementById("userInput").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
