<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MediCare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); margin:0; }

    .auth-split {
      display:grid; grid-template-columns:1fr 1fr;
      width:900px; max-width:96vw;
      border-radius:20px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.15);
    }

    /* Left panel */
    .auth-left {
      background:linear-gradient(145deg,#0c1a2e 0%,#0ea5b0 100%);
      padding:52px 44px;
      display:flex; flex-direction:column; justify-content:space-between;
      color:#fff; position:relative; overflow:hidden;
    }
    .auth-left::before {
      content:''; position:absolute; right:-60px; top:-60px;
      width:220px; height:220px; border-radius:50%;
      background:rgba(255,255,255,0.06);
    }
    .auth-left::after {
      content:''; position:absolute; left:-40px; bottom:-50px;
      width:180px; height:180px; border-radius:50%;
      background:rgba(255,255,255,0.04);
    }
    .brand { z-index:1; }
    .brand-icon {
      width:52px; height:52px; border-radius:14px;
      background:rgba(255,255,255,0.15);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; margin-bottom:16px;
    }
    .brand h1 { font-size:26px; font-weight:800; margin-bottom:6px; }
    .brand p  { opacity:0.65; font-size:14px; }

    .auth-features { z-index:1; }
    .auth-feature  { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .auth-feature .feat-icon {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.12);
      display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;
    }
    .auth-feature .feat-text  { font-size:13px; opacity:0.85; }
    .auth-feature .feat-title { font-weight:700; font-size:14px; margin-bottom:2px; }

    /* Right panel */
    .auth-right {
      background:#fff;
      padding:52px 44px;
      display:flex; flex-direction:column; justify-content:center;
    }
    .auth-right h2 { font-size:24px; font-weight:800; margin-bottom:6px; color:var(--text-main); }
    .auth-right .subtitle { color:var(--text-sub); font-size:14px; margin-bottom:32px; }

    .form-field { margin-bottom:18px; }
    .form-field label {
      display:block; font-size:12px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.6px;
      color:var(--text-sub); margin-bottom:6px;
    }
    .input-wrap { position:relative; }
    .input-wrap .input-icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      font-size:16px; pointer-events:none;
    }
    .input-wrap input {
      width:100%; padding:12px 14px 12px 42px;
      border:1.5px solid var(--border); border-radius:10px;
      font-family:var(--font); font-size:14px; color:var(--text-main);
      background:var(--bg); outline:none; transition:all 0.2s;
    }
    .input-wrap input:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(14,165,176,0.12);
      background:#fff;
    }
    .pw-wrap input { padding-right:44px; }
    #toggle-password {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; font-size:17px; padding:0;
    }

    .error-box {
      display:none;
      background:var(--danger-light); color:#991b1b;
      border:1px solid #fca5a5; border-radius:8px;
      padding:10px 14px; font-size:13px; margin-bottom:16px;
    }

    #login-btn {
      width:100%; padding:13px;
      background:linear-gradient(135deg,var(--primary),#0891b2);
      color:#fff; border:none; border-radius:10px;
      font-family:var(--font); font-size:15px; font-weight:700;
      cursor:pointer; transition:all 0.2s; margin-top:6px;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    #login-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(14,165,176,0.35); }
    #login-btn:disabled { opacity:0.65; cursor:not-allowed; }

    .spinner {
      width:16px; height:16px; border:2px solid rgba(255,255,255,0.4);
      border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .demo-hint {
      margin-top:24px; padding:14px;
      background:var(--primary-light); border-radius:10px;
      font-size:12.5px; color:var(--primary-dark); text-align:center;
    }
    .demo-hint strong { display:block; margin-bottom:6px; }
    .demo-creds { font-family:var(--mono); font-size:12px; }

    @media(max-width:640px){
      .auth-split { grid-template-columns:1fr; }
      .auth-left  { display:none; }
      .auth-right { padding:36px 24px; }
    }
  </style>
</head>
<body>

<div class="auth-split">

  <!-- LEFT: branding -->
  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">🏥</div>
      <h1>MediCare</h1>
      <p>Your complete patient health portal.</p>
    </div>
    <div class="auth-features">
      <div class="auth-feature">
        <div class="feat-icon">📅</div>
        <div>
          <div class="feat-title">Appointments</div>
          <div class="feat-text">Book & manage all your doctor visits.</div>
        </div>
      </div>
      <div class="auth-feature">
        <div class="feat-icon">💊</div>
        <div>
          <div class="feat-title">Medicine Reminders</div>
          <div class="feat-text">Never miss a dose with smart alerts.</div>
        </div>
      </div>
      <div class="auth-feature">
        <div class="feat-icon">📋</div>
        <div>
          <div class="feat-title">Medical Records</div>
          <div class="feat-text">All your health history in one place.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: login form -->
  <div class="auth-right">
    <h2>Welcome back 👋</h2>
    <p class="subtitle">Sign in to access your patient dashboard.</p>

    <div class="error-box" id="login-error"></div>

    <form id="login-form" autocomplete="off">

      <div class="form-field">
        <label for="login-username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" required />
        </div>
      </div>

      <div class="form-field">
        <label for="login-password">Password</label>
        <div class="input-wrap pw-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" id="toggle-password" title="Show / Hide password">👁️</button>
        </div>
      </div>

      <button type="submit" id="login-btn">Sign In</button>

    </form>

  </div>

</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
