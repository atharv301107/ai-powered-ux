{% extends 'base.html' %}
{% set page_title = 'User Management' %}
{% block content %}
<div class="content-card mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>User List</h5>
        <a href="{{ url_for('add_user') }}" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add User</a>
    </div>

    <form class="row g-2 mb-3" method="GET">
        <div class="col-md-5">
            <input type="text" name="search" class="form-control" placeholder="Search by name or email" value="{{ search }}">
        </div>
        <div class="col-md-4">
            <select name="role" class="form-select">
                <option value="">All Roles</option>
                {% for r in ['Admin','Doctor','Patient','Staff'] %}
                <option value="{{ r }}" {% if role == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <button class="btn btn-dark w-100">Filter</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Action</th></tr>
            </thead>
            <tbody>
            {% for u in users %}
                <tr>
                    <td>{{ u.id }}</td>
                    <td>{{ u.name }}</td>
                    <td>{{ u.email }}</td>
                    <td><span class="role-pill">{{ u.role }}</span></td>
                    <td><span class="status-badge status-{{ u.status|lower }}">{{ u.status }}</span></td>
                    <td>{{ u.created_at }}</td>
                    <td>
                        <a href="{{ url_for('edit_user', user_id=u.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a href="{{ url_for('delete_user', user_id=u.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this user?')">Delete</a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
