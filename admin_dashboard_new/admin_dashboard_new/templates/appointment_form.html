{% extends 'base.html' %}
{% set page_title = title %}
{% block content %}
<div class="content-card mt-3 form-card">
    <h5>{{ title }}</h5>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Patient Name</label>
                <input type="text" name="patient_name" class="form-control" value="{{ appointment.patient_name if appointment else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Doctor Name</label>
                <input type="text" name="doctor_name" class="form-control" value="{{ appointment.doctor_name if appointment else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Appointment Date</label>
                <input type="date" name="appointment_date" class="form-control" value="{{ appointment.appointment_date if appointment else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" value="{{ appointment.department if appointment else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Status</label>
                <select name="status" class="form-select" required>
                    {% for s in ['Pending','Confirmed','Completed','Cancelled'] %}
                    <option value="{{ s }}" {% if appointment and appointment.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-primary">Save Appointment</button>
            <a href="{{ url_for('appointments') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
