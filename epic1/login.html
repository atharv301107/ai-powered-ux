<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Authentication</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginForm" class="form active">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="error" id="loginError"></p>

        <div class="link">
            <a onclick="showForm('registerForm')">Create Account</a><br><br>
            <a onclick="showForm('forgotForm')">Forgot Password?</a>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form">
        <h2>Register</h2>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button onclick="register()">Register</button>

        <p class="error" id="registerError"></p>

        <div class="link">
            <a onclick="showForm('loginForm')">Already have an account?</a>
        </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotForm" class="form">
        <h2>Forgot Password</h2>

        <input type="email" id="forgotEmail" placeholder="Enter Email">

        <button onclick="forgotPassword()">Send Reset Link</button>

        <p class="error" id="forgotError"></p>

        <div class="link">
            <a onclick="showForm('loginForm')">Back to Login</a>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
